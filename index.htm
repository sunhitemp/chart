<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>陽昇電熱溫度曲線圖20250701</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false">

<div class="app-container">
  <header class="app-header">
    <div class="header-logo">
      <a href="https://www.sunhitemp.com"><img src="SUNRISE10D2.jpg" alt="陽昇電熱有限公司" height="40"></a>
    </div>
    <div class="header-title">
      <h1>陽昇電熱 溫度曲線圖</h1>
      <span class="copyright">© 2015-2025 陽昇電熱有限公司 (03-3624888 / 0966-661-288)</span>
    </div>
  </header>

  <main class="app-main">
    <!-- 左側面板 (控制區) -->
    <aside class="sidebar">
      <div class="card">
        <h3>範例程式 (預設)</h3>
        <div class="btn-group">
          <button id="example1" class="btn btn-primary">素燒</button>
          <button id="example2" class="btn btn-secondary">釉燒</button>
          <button id="example3" class="btn btn-accent">熱處理</button>
        </div>
      </div>
      
      <div class="card">
        <h3>控制與操作</h3>
        <div class="input-group">
          <label for="maxTemp">最大溫度 (°C)</label>
          <input type="number" id="maxTemp" value="1300" min="100" max="2000">
        </div>
        <div class="btn-group-grid">
          <button id="example4" class="btn btn-outline">開始 (Start)</button>
          <button id="addSegment" class="btn btn-danger">增加段數 (+)</button>
          <button id="removeSegment" class="btn btn-success">減少段數 (-)</button>
          <button id="test3" class="btn btn-warning">檢查錯誤</button>
          <button id="outdate" class="btn btn-info">流程圖</button>
          <button id="restartApp" class="btn btn-dark">重新載入</button>
        </div>
        <!-- 隱藏但保留 JS 邏輯所需 -->
        <input type="number" id="timeExtendRate" value="60" style="display:none;"> 
      </div>
      
      <div id="error-message" class="error-msg"></div>
    </aside>

    <!-- 右側主要區 (圖表與數據) -->
    <section class="content-area">
      <div class="card chart-card">
        <div id="chart-container">
          <div class="zoom-controls">
            <button id="zoomInBtn" class="btn-zoom" title="放大">+</button>
            <button id="zoomOutBtn" class="btn-zoom" title="縮小">-</button>
          </div>
          <div class="snap-control">
            <input type="checkbox" id="autoSnap" checked>
            <label for="autoSnap">自動吸附格子</label>
          </div>
          <!-- Canvas 加入 CSS touch-action 屬性防誤滑 -->
          <canvas id="lineChart"></canvas>
        </div>
      </div>
      
      <div class="card summary-card">
        <div class="summary-header">
          <h3>程式設定 (數據面板)</h3>
        </div>
        <div id="segment-summary"></div>
      </div>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
