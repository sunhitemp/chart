<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>陽昇電熱溫度曲線圖20250701</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=2" />
  </head>
  <body oncontextmenu="return false;">
    <!-- 反調試機制 (暫時註解關閉) -->
    <script>

    </script>

    <div class="app-container">
      <header class="app-header" id="part-header">
        <div class="header-logo">
          <a href="https://www.sunhitemp.com"
            ><img src="SUNRISE10D2.jpg" alt="陽昇電熱有限公司" height="60"
          /></a>
        </div>
        <div class="header-title">
          <h1>陽昇電熱 溫度曲線圖</h1>
          <span class="copyright"
            >© 2015-2025 陽昇電熱有限公司<br />(03-3624888 / 0966-661-288)</span
          >
        </div>
      </header>

      <div class="card" id="part-examples">
        <div class="examples-header">
          <h3>範例程式</h3>
          <div class="btn-group">
            <button id="example1" class="btn btn-primary">素燒</button>
            <button id="example2" class="btn btn-secondary">釉燒</button>
            <button id="example3" class="btn btn-accent">熱處理</button>
          </div>
        </div>
      </div>

      <div class="card" id="part-controls">
        <div class="controls-header">
          <h3>控制與操作</h3>
          <div class="input-group inline-input">
            <label for="maxTemp">最大溫度 (°C)</label>
            <input
              type="number"
              id="maxTemp"
              value="1300"
              min="100"
              max="2000"
            />
          </div>
        </div>
        <div class="btn-group-row">
          <button id="example4" class="btn btn-outline">開始</button>
          <button id="addSegment" class="btn btn-danger">
            增加段數<br />(+)
          </button>
          <button id="removeSegment" class="btn btn-success">
            減少段數<br />(-)
          </button>
          <button id="test3" class="btn btn-warning">自動設定</button>
          <button id="outdate" class="btn btn-info">設定方法</button>
          <button id="restartApp" class="btn btn-dark">重新載入</button>
        </div>
        <!-- 隱藏但保留 JS 邏輯所需 -->
        <input
          type="number"
          id="timeExtendRate"
          value="60"
          style="display: none"
        />
      </div>

      <div class="card chart-card" id="part-chart">
        <div id="chart-container">
          <div class="zoom-controls">
            <button id="zoomInBtn" class="btn-zoom" title="增加段數">
              + 段
            </button>
            <button id="zoomOutBtn" class="btn-zoom" title="減少段數">
              - 段
            </button>
          </div>
          <div class="snap-control">
            <input type="checkbox" id="autoSnap" checked />
            <label for="autoSnap">吸附</label>
          </div>
          <button id="fullscreenBtn" class="btn-fullscreen" title="全螢幕切換">
            ⛶ 全螢幕
          </button>
          <!-- Canvas 加入 CSS touch-action 屬性防誤滑 -->
          <canvas id="lineChart"></canvas>
        </div>
      </div>

      <div class="card summary-card" id="part-data">
        <div id="segment-summary"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js?v=4"></script>
  </body>
</html>
